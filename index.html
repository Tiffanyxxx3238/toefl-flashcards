<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOEFL Vocabulary</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f2ed; --surface: #faf8f5; --ink: #1a1814;
    --ink-muted: #6b6560; --ink-faint: #b5b0a8;
    --again: #c0392b; --hard: #d35400; --good: #27ae60; --easy: #2980b9;
    --again-bg: #fdf0ee; --hard-bg: #fef6ee; --good-bg: #edfbf2; --easy-bg: #eef6fd;
    --radius: 14px; --card-h: 460px;
  }
  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg); color: var(--ink);
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; padding: 20px 16px 110px;
    user-select: none;
  }

  /* Header */
  #header { width:100%; max-width:560px; margin-bottom:20px; }
  #progress-row { display:flex; align-items:center; gap:10px; margin-bottom:5px; }
  #progress-text { font-size:11px; color:var(--ink-muted); letter-spacing:.04em; white-space:nowrap; min-width:80px; }
  #progress-bar-wrap { flex:1; height:3px; background:var(--ink-faint); border-radius:99px; overflow:hidden; }
  #progress-bar { height:100%; background:var(--ink); border-radius:99px; transition:width .4s ease; }
  #remaining-text { font-size:11px; color:var(--ink-faint); white-space:nowrap; }
  #sync-status { font-size:10px; color:var(--ink-faint); display:flex; align-items:center; gap:5px; }
  #sync-dot { width:6px; height:6px; border-radius:50%; background:var(--ink-faint); transition:background .3s; flex-shrink:0; }
  #sync-dot.syncing { background:#f39c12; }
  #sync-dot.synced  { background:var(--good); }
  #sync-dot.error   { background:var(--again); }

  /* Card */
  #scene { width:100%; max-width:560px; height:var(--card-h); perspective:1200px; cursor:pointer; margin-bottom:18px; }
  #card { width:100%; height:100%; position:relative; transform-style:preserve-3d; transition:transform .55s cubic-bezier(.4,0,.2,1); }
  #card.flipped { transform:rotateY(180deg); }
  .face {
    position:absolute; inset:0; background:var(--surface);
    border-radius:var(--radius); backface-visibility:hidden; -webkit-backface-visibility:hidden;
    box-shadow:0 2px 0 #d8d3cc, 0 8px 32px rgba(0,0,0,.07); overflow:hidden;
  }

  /* Front */
  .face.front { display:flex; flex-direction:column; align-items:center; justify-content:flex-start; }
  #card-img-wrap {
    width:100%; height:200px; flex-shrink:0; overflow:hidden;
    position:relative; background:#e8e3dc;
  }
  #card-img { width:100%; height:100%; object-fit:cover; transition:opacity .5s; opacity:0; }
  #card-img.loaded { opacity:1; }
  #img-placeholder {
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-size:2.5rem; color:var(--ink-faint); background:#e8e3dc;
    transition:opacity .3s;
  }
  #front-content {
    flex:1; display:flex; flex-direction:column;
    align-items:center; justify-content:center; padding:20px 28px 16px; width:100%;
  }
  #word-display {
    font-family:'Fraunces',serif; font-size:clamp(2rem,7vw,3.2rem);
    font-weight:300; letter-spacing:-.01em; line-height:1.1; text-align:center;
  }
  #hint { margin-top:12px; font-size:10px; color:var(--ink-faint); letter-spacing:.06em; text-transform:uppercase; }
  #speak-btn {
    position:absolute; top:210px; right:14px; width:34px; height:34px;
    border:1.5px solid var(--ink-faint); border-radius:50%; background:var(--surface);
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    color:var(--ink-muted); font-size:14px; transition:border-color .2s,color .2s; z-index:2;
  }
  #speak-btn:hover, #speak-btn.speaking { border-color:var(--ink); color:var(--ink); }

  /* Back */
  .face.back {
    transform:rotateY(180deg);
    display:flex; flex-direction:column; align-items:flex-start;
    padding:22px 26px 16px; overflow-y:auto;
  }
  #speak-btn-back {
    position:absolute; top:14px; right:14px; width:34px; height:34px;
    border:1.5px solid var(--ink-faint); border-radius:50%; background:transparent;
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    color:var(--ink-muted); font-size:14px; transition:border-color .2s,color .2s;
  }
  #speak-btn-back:hover, #speak-btn-back.speaking { border-color:var(--ink); color:var(--ink); }
  #back-word { font-family:'Fraunces',serif; font-size:1.6rem; font-weight:300; margin-bottom:12px; padding-right:42px; }
  .def-row { display:flex; gap:10px; margin-bottom:9px; width:100%; }
  .pos-tag { font-size:10px; color:var(--ink-faint); border:1px solid var(--ink-faint); padding:2px 5px; border-radius:4px; white-space:nowrap; height:fit-content; margin-top:2px; letter-spacing:.04em; flex-shrink:0; }
  .def-text { font-size:13px; color:var(--ink); line-height:1.5; }

  /* Example */
  .example-wrap { width:100%; margin-top:10px; padding-top:10px; border-top:1px solid #e8e3dc; }
  .example-label { font-size:9px; color:var(--ink-faint); letter-spacing:.06em; text-transform:uppercase; margin-bottom:5px; }
  .example-en { font-size:12px; color:var(--ink); line-height:1.6; font-style:italic; cursor:pointer; }
  .example-zh { font-size:11px; color:var(--ink-muted); line-height:1.5; margin-top:5px; padding:5px 9px; background:#ede9e2; border-radius:6px; display:none; }
  .example-zh.visible { display:block; }
  .reveal-hint { font-size:9px; color:var(--ink-faint); margin-top:3px; display:inline-block; transition:opacity .2s; }

  .gen-indicator { display:flex; align-items:center; gap:5px; margin-top:10px; padding-top:10px; border-top:1px solid #e8e3dc; font-size:11px; color:var(--ink-faint); font-style:italic; }
  .gen-dot { width:4px; height:4px; border-radius:50%; background:var(--ink-faint); animation:pulse 1.2s infinite; }
  .gen-dot:nth-child(2){animation-delay:.2s;} .gen-dot:nth-child(3){animation-delay:.4s;}
  @keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}

  /* Actions */
  #actions { width:100%; max-width:560px; display:none; gap:8px; margin-bottom:16px; }
  #actions.visible { display:flex; }
  .act-btn { flex:1; height:50px; border:none; border-radius:10px; cursor:pointer; font-family:'DM Mono',monospace; font-size:18px; display:flex; align-items:center; justify-content:center; transition:transform .12s; }
  .act-btn:active { transform:scale(.95); }
  #btn-again{background:var(--again-bg);color:var(--again);}
  #btn-hard {background:var(--hard-bg); color:var(--hard); }
  #btn-good {background:var(--good-bg); color:var(--good); }
  #btn-easy {background:var(--easy-bg); color:var(--easy); }

  /* Stats */
  #stats { width:100%; max-width:560px; display:flex; gap:8px; }
  .stat-cell { flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; }
  .stat-num { font-size:17px; }
  #stat-again .stat-num{color:var(--again);}
  #stat-hard  .stat-num{color:var(--hard);}
  #stat-good  .stat-num{color:var(--good);}
  #stat-easy  .stat-num{color:var(--easy);}
  .stat-label { font-size:9px; color:var(--ink-faint); letter-spacing:.06em; text-transform:uppercase; }

  /* Shortcuts */
  #shortcuts { position:fixed; bottom:14px; right:14px; background:var(--surface); border:1px solid #e0dbd3; border-radius:10px; padding:9px 13px; font-size:10px; color:var(--ink-muted); line-height:1.85; box-shadow:0 2px 12px rgba(0,0,0,.07); z-index:100; }
  #shortcuts b { color:var(--ink); }

  /* Loading */
  #loading { position:fixed; inset:0; background:var(--bg); z-index:200; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; transition:opacity .5s; }
  #loading.hidden { opacity:0; pointer-events:none; }
  #loading-word { font-family:'Fraunces',serif; font-size:2.2rem; font-weight:300; }
  #loading-sub  { font-size:11px; color:var(--ink-faint); letter-spacing:.06em; }
</style>
</head>
<body>

<div id="loading">
  <div id="loading-word">TOEFL</div>
  <div id="loading-sub">正在連線同步…</div>
</div>

<div id="header">
  <div id="progress-row">
    <span id="progress-text">— / —</span>
    <div id="progress-bar-wrap"><div id="progress-bar" style="width:0%"></div></div>
    <span id="remaining-text">— left</span>
  </div>
  <div id="sync-status">
    <div id="sync-dot"></div>
    <span id="sync-label">連線中…</span>
  </div>
</div>

<div id="scene" onclick="handleCardClick(event)">
  <div id="card">
    <div class="face front">
      <div id="card-img-wrap">
        <div id="img-placeholder">📖</div>
        <img id="card-img" alt="" />
      </div>
      <div id="front-content">
        <div id="word-display">—</div>
        <div id="hint">tap to reveal · space / 0</div>
      </div>
      <button id="speak-btn" onclick="event.stopPropagation();speakCurrent()" title="朗讀 (5/G)">🔊</button>
    </div>
    <div class="face back">
      <button id="speak-btn-back" onclick="event.stopPropagation();speakCurrent()" title="朗讀 (5/G)">🔊</button>
      <div id="back-word">—</div>
      <div id="definitions"></div>
      <div id="example-area"></div>
    </div>
  </div>
</div>

<div id="actions">
  <button class="act-btn" id="btn-again" onclick="rate('again')" title="Again (1/A)">1</button>
  <button class="act-btn" id="btn-hard"  onclick="rate('hard')"  title="Hard (2/S)">2</button>
  <button class="act-btn" id="btn-good"  onclick="rate('good')"  title="Good (3/D)">3</button>
  <button class="act-btn" id="btn-easy"  onclick="rate('easy')"  title="Easy (4/F)">4</button>
</div>

<div id="stats">
  <div class="stat-cell" id="stat-again"><div class="stat-num" id="cnt-again">0</div><div class="stat-label">Again</div></div>
  <div class="stat-cell" id="stat-hard"> <div class="stat-num" id="cnt-hard">0</div> <div class="stat-label">Hard</div></div>
  <div class="stat-cell" id="stat-good"> <div class="stat-num" id="cnt-good">0</div> <div class="stat-label">Good</div></div>
  <div class="stat-cell" id="stat-easy"> <div class="stat-num" id="cnt-easy">0</div> <div class="stat-label">Easy</div></div>
</div>

<div id="shortcuts">
  <b>翻面</b> Space / 0<br>
  <b>Again</b> 1 / A<br>
  <b>Hard</b> 2 / S<br>
  <b>Good</b> 3 / D<br>
  <b>Easy</b> 4 / F<br>
  <b>朗讀</b> 5 / G
</div>

// ── State ──
let queue = [], currentIdx = 0, isFlipped = false;
let stats = { again:0, hard:0, good:0, easy:0 };
let saveTimeout = null;
let exampleCache = {};
// imgSeeds: stable seed per word index so same word always gets same Picsum image
const imgSeeds = {};

// ── Picsum image URL (free, no API key, always works) ──
// Uses a stable seed derived from the word so same word = same image
function picsumUrl(word) {
  if (!imgSeeds[word]) {
    // Generate a stable numeric seed from the word string
    let hash = 0;
    for (let i = 0; i < word.length; i++) {
      hash = ((hash << 5) - hash) + word.charCodeAt(i);
      hash |= 0;
    }
    imgSeeds[word] = Math.abs(hash) % 1000;
  }
  return `https://picsum.photos/seed/${imgSeeds[word]}/560/200`;
}

// ── Preload images for next N cards ──
const preloaded = {};
function preloadAhead(n = 3) {
  for (let i = 1; i <= n; i++) {
    const idx = currentIdx + i;
    if (idx >= queue.length) break;
    const word = ALL_VOCAB[queue[idx]]?.word;
    if (word && !preloaded[word]) {
      preloaded[word] = true;
      const img = new Image();
      img.src = picsumUrl(word);
    }
  }
}

// ── Set card image ──
function setCardImage(word) {
  const imgEl = document.getElementById('card-img');
  const ph    = document.getElementById('img-placeholder');
  const url   = picsumUrl(word);

  imgEl.classList.remove('loaded');
  ph.style.opacity = '1';

  imgEl.onload = () => {
    imgEl.classList.add('loaded');
    ph.style.opacity = '0';
  };
  imgEl.onerror = () => {
    ph.style.opacity = '1';
    imgEl.classList.add('loaded');
  };
  imgEl.src = url;
}

// ── Sync status ──
function setSyncStatus(state, label) {
  document.getElementById('sync-dot').className = state;
  document.getElementById('sync-label').textContent = label;
}

// ── localStorage fallback ──
function lsSave() {
  try { localStorage.setItem(LS_KEY, JSON.stringify({ queue, currentIdx, stats })); } catch(e) {}
}
function lsLoad() {
  try {
    const s = JSON.parse(localStorage.getItem(LS_KEY));
    if (s && s.queue) { queue=s.queue; currentIdx=s.currentIdx; stats=s.stats; return true; }
  } catch(e) {}
  return false;
}

// ── Firebase save (debounced) ──
function saveState() {
  lsSave();
  clearTimeout(saveTimeout);
  setSyncStatus('syncing', '同步中…');
  saveTimeout = setTimeout(async () => {
    try {
      await set(ref(db, SAVE_PATH), { queue, currentIdx, stats, updatedAt: Date.now() });
      setSyncStatus('synced', '已同步 ✓');
    } catch(e) { setSyncStatus('error', '同步失敗（已存本機）'); }
  }, 1500);
}

async function loadExampleCache() {
  try {
    const snap = await get(ref(db, EX_PATH));
    if (snap.exists()) exampleCache = snap.val() || {};
  } catch(e) {}
}

async function saveExampleToFirebase(word, en, zh) {
  try {
    const key = word.replace(/[.#$/\[\]]/g, '_');
    await set(ref(db, EX_PATH + '/' + key), { en, zh });
    exampleCache[key] = { en, zh };
  } catch(e) {}
}

function initQueue() {
  queue = ALL_VOCAB.map((_, i) => i);
  currentIdx = 0;
  stats = { again:0, hard:0, good:0, easy:0 };
}

async function loadState() {
  try {
    const snap = await get(ref(db, SAVE_PATH));
    if (snap.exists()) {
      const s = snap.val();
      queue=s.queue; currentIdx=s.currentIdx; stats=s.stats;
      lsSave(); return true;
    }
  } catch(e) {
    setSyncStatus('error', '無法連線，使用本機');
    return lsLoad();
  }
  return false;
}

function listenRemote() {
  onValue(ref(db, SAVE_PATH), snap => {
    if (!snap.exists() || isFlipped) return;
    const s = snap.val();
    if (s.updatedAt && s.updatedAt > (window._lastSave || 0)) {
      queue=s.queue; currentIdx=s.currentIdx; stats=s.stats;
      lsSave(); render();
      setSyncStatus('synced', '已從其他裝置同步 ✓');
      setTimeout(() => setSyncStatus('synced', '已同步 ✓'), 3000);
    }
  });
}

// ── Generate example via Claude API ──
async function generateExample(word, pos, zhDef) {
  const prompt = `For the English word "${word}" (${pos}: ${zhDef}), write ONE short natural example sentence (10-18 words) and its Traditional Chinese translation.
Reply ONLY with this JSON, no other text: {"en":"Example sentence.","zh":"繁體中文翻譯。"}`;
  try {
    const resp = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "content-type": "application/json", "anthropic-version": "2023-06-01" },
      body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:150,
        messages:[{ role:"user", content:prompt }] })
    });
    if (!resp.ok) return null;
    const data = await resp.json();
    const text = data.content[0].text.trim();
    const m = text.match(/\{[\s\S]*?\}/);
    if (m) return JSON.parse(m[0]);
  } catch(e) {}
  return null;
}

// ── Speak word + example ──
function speakCurrent() {
  const w = currentWord(); if (!w) return;
  window.speechSynthesis.cancel();
  const exEl = document.getElementById('ex-en-text');
  const exText = exEl ? exEl.textContent.trim() : '';
  document.querySelectorAll('#speak-btn,#speak-btn-back').forEach(b => b.classList.add('speaking'));

  const uttWord = new SpeechSynthesisUtterance(w.word);
  uttWord.lang = 'en-US'; uttWord.rate = 0.85;

  const done = () => document.querySelectorAll('#speak-btn,#speak-btn-back').forEach(b => b.classList.remove('speaking'));

  if (exText) {
    uttWord.onend = () => setTimeout(() => {
      const uttEx = new SpeechSynthesisUtterance(exText);
      uttEx.lang = 'en-US'; uttEx.rate = 0.85;
      uttEx.onend = uttEx.onerror = done;
      window.speechSynthesis.speak(uttEx);
    }, 400);
  } else {
    uttWord.onend = uttWord.onerror = done;
  }
  uttWord.onerror = done;
  window.speechSynthesis.speak(uttWord);
}
window.speakCurrent = speakCurrent;

// ── Render ──
function currentWord() {
  return currentIdx < queue.length ? ALL_VOCAB[queue[currentIdx]] : null;
}

function render() {
  const w = currentWord();
  if (!w) { renderDone(); return; }

  document.getElementById('word-display').textContent = w.word;
  document.getElementById('back-word').textContent = w.word;
  setCardImage(w.word);
  preloadAhead(3);

  const defEl = document.getElementById('definitions');
  defEl.innerHTML = '';
  w.definitions.forEach(d => {
    const row = document.createElement('div');
    row.className = 'def-row';
    const enPart = d.en_hint ? `<div style="font-size:10px;color:var(--ink-muted);font-style:italic;margin-top:2px">${d.en_hint}</div>` : '';
    row.innerHTML = `<span class="pos-tag">${d.pos}</span><div><div class="def-text">${d.def}</div>${enPart}</div>`;
    defEl.appendChild(row);
  });

  renderExample(w);

  const total = queue.length, done = currentIdx;
  document.getElementById('progress-text').textContent = `${done+1} / ${total}`;
  document.getElementById('progress-bar').style.width = total ? (done/total*100).toFixed(1)+'%' : '100%';
  document.getElementById('remaining-text').textContent = `${total-done} left`;
  document.getElementById('cnt-again').textContent = stats.again;
  document.getElementById('cnt-hard').textContent  = stats.hard;
  document.getElementById('cnt-good').textContent  = stats.good;
  document.getElementById('cnt-easy').textContent  = stats.easy;
}

function renderExample(w) {
  const area = document.getElementById('example-area');
  const key  = w.word.replace(/[.#$/\[\]]/g, '_');
  const cached = exampleCache[key];

  if (cached && cached.en) {
    showExampleHTML(area, cached.en, cached.zh);
  } else if (w.example_en) {
    showExampleHTML(area, w.example_en, w.example_zh || '');
    exampleCache[key] = { en: w.example_en, zh: w.example_zh || '' };
  } else {
    area.innerHTML = `<div class="gen-indicator">
      <div class="gen-dot"></div><div class="gen-dot"></div><div class="gen-dot"></div>
      <span>生成例句中…</span></div>`;
    const d = w.definitions[0];
    generateExample(w.word, d.pos, d.def).then(result => {
      if (result && result.en) {
        saveExampleToFirebase(w.word, result.en, result.zh || '');
        if (currentWord()?.word === w.word) showExampleHTML(area, result.en, result.zh || '');
      } else {
        area.innerHTML = '';
      }
    });
  }
}

function showExampleHTML(area, en, zh) {
  area.innerHTML = `
    <div class="example-wrap">
      <div class="example-label">例句</div>
      <div class="example-en" id="ex-en-text">${en}</div>
      <div class="example-zh" id="ex-zh-text">${zh || '（翻譯生成中）'}</div>
      <span class="reveal-hint">hover / 點擊 查看中文</span>
    </div>`;
  const enEl  = area.querySelector('.example-en');
  const zhEl  = area.querySelector('.example-zh');
  const hint  = area.querySelector('.reveal-hint');
  enEl.addEventListener('mouseenter', () => { zhEl.classList.add('visible'); hint.style.opacity='0'; });
  enEl.addEventListener('mouseleave', () => { zhEl.classList.remove('visible'); hint.style.opacity=''; });
  enEl.addEventListener('click', e => {
    e.stopPropagation();
    zhEl.classList.toggle('visible');
    hint.style.opacity = zhEl.classList.contains('visible') ? '0' : '';
  });
}

function renderDone() {
  document.getElementById('word-display').textContent = '🎉 完成！';
  document.getElementById('hint').textContent = `所有 ${ALL_VOCAB.length} 張複習完畢`;
  document.getElementById('back-word').textContent = '今日完成';
  document.getElementById('definitions').innerHTML = '<div class="def-row"><span class="def-text">重新整理頁面即可從頭開始。</span></div>';
  document.getElementById('example-area').innerHTML = '';
  document.getElementById('progress-bar').style.width = '100%';
  document.getElementById('progress-text').textContent = `${ALL_VOCAB.length} / ${ALL_VOCAB.length}`;
  document.getElementById('remaining-text').textContent = '0 left';
  document.getElementById('card-img').src = '';
  document.getElementById('img-placeholder').style.opacity = '1';
}

// ── Flip ──
function handleCardClick(e) {
  if (e.target.closest('.example-en') || e.target.closest('.example-zh')) return;
  flipCard();
}
function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('card').classList.toggle('flipped', isFlipped);
  document.getElementById('actions').classList.toggle('visible', isFlipped);
}
function setFlip(state) {
  isFlipped = state;
  document.getElementById('card').classList.toggle('flipped', state);
  document.getElementById('actions').classList.toggle('visible', state);
}
window.flipCard = flipCard;
window.handleCardClick = handleCardClick;

// ── Rate ──
function rate(rating) {
  if (!isFlipped) return;
  stats[rating]++;
  const total = queue.length;
  if (rating === 'again') {
    const ci = queue[currentIdx]; queue.splice(currentIdx, 1);
    queue.splice(Math.min(currentIdx+2, queue.length), 0, ci);
  } else if (rating === 'hard') {
    const range = Math.min(5, total-currentIdx-1);
    const offset = range > 0 ? Math.floor(Math.random()*range)+1 : 1;
    const ci = queue[currentIdx]; queue.splice(currentIdx, 1);
    queue.splice(Math.min(currentIdx+offset, queue.length), 0, ci);
  } else if (rating === 'good') {
    const rem = total-currentIdx-1;
    const bs  = currentIdx+Math.floor(rem*0.6)+1;
    const ins = bs+Math.floor(Math.random()*Math.max(1, total-1-bs+1));
    const ci  = queue[currentIdx]; queue.splice(currentIdx, 1);
    queue.splice(Math.min(ins, queue.length), 0, ci);
  } else {
    queue.splice(currentIdx, 1);
    currentIdx = Math.min(currentIdx, queue.length-1);
  }
  window._lastSave = Date.now();
  saveState();
  setFlip(false);
  render();
}
window.rate = rate;

// ── Keyboard ──
document.addEventListener('keydown', e => {
  if (e.repeat) return;
  const k = e.key;
  if (k===' '||k==='0') { e.preventDefault(); flipCard(); }
  else if (k==='1'||k.toLowerCase()==='a') rate('again');
  else if (k==='2'||k.toLowerCase()==='s') rate('hard');
  else if (k==='3'||k.toLowerCase()==='d') rate('good');
  else if (k==='4'||k.toLowerCase()==='f') rate('easy');
  else if (k==='5'||k.toLowerCase()==='g') speakCurrent();
});

// ── Boot ──
(async () => {
  await loadExampleCache();
  const loaded = await loadState();
  if (!loaded && !lsLoad()) initQueue();
  render();
  listenRemote();
  setSyncStatus('synced', '已同步 ✓');
  const overlay = document.getElementById('loading');
  overlay.classList.add('hidden');
  setTimeout(() => overlay.remove(), 500);
})();
</script>
