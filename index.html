<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOEFL Vocabulary</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f2ed; --surface: #faf8f5; --ink: #1a1814;
    --ink-muted: #6b6560; --ink-faint: #b5b0a8;
    --again: #c0392b; --hard: #d35400; --good: #27ae60; --easy: #2980b9;
    --again-bg: #fdf0ee; --hard-bg: #fef6ee; --good-bg: #edfbf2; --easy-bg: #eef6fd;
    --radius: 12px; --card-h: 340px;
  }
  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg); color: var(--ink);
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; padding: 24px 16px 120px; user-select: none;
  }

  /* ── Header ── */
  #header { width: 100%; max-width: 560px; margin-bottom: 28px; }
  #progress-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  #progress-text { font-size: 11px; color: var(--ink-muted); letter-spacing:.04em; white-space:nowrap; min-width:80px; }
  #progress-bar-wrap { flex:1; height:3px; background:var(--ink-faint); border-radius:99px; overflow:hidden; }
  #progress-bar { height:100%; background:var(--ink); border-radius:99px; transition:width .4s ease; }
  #remaining-text { font-size:11px; color:var(--ink-faint); white-space:nowrap; }

  /* ── Sync status ── */
  #sync-status {
    font-size: 10px; color: var(--ink-faint); letter-spacing:.04em;
    display: flex; align-items: center; gap: 5px; margin-top: 4px;
  }
  #sync-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--ink-faint); transition: background .3s;
  }
  #sync-dot.syncing { background: #f39c12; }
  #sync-dot.synced  { background: var(--good); }
  #sync-dot.error   { background: var(--again); }

  /* ── Card ── */
  #scene {
    width:100%; max-width:560px; height:var(--card-h);
    perspective:1200px; cursor:pointer; margin-bottom:20px;
  }
  #card {
    width:100%; height:100%; position:relative;
    transform-style:preserve-3d; transition:transform .55s cubic-bezier(.4,0,.2,1);
  }
  #card.flipped { transform: rotateY(180deg); }
  .face {
    position:absolute; inset:0; background:var(--surface);
    border-radius:var(--radius); backface-visibility:hidden;
    -webkit-backface-visibility:hidden;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:32px; box-shadow: 0 2px 0 #d8d3cc, 0 8px 32px rgba(0,0,0,.07);
  }
  .face.back {
    transform:rotateY(180deg); justify-content:flex-start;
    align-items:flex-start; padding:28px 32px; overflow-y:auto;
  }

  /* ── Front ── */
  #word-display {
    font-family:'Fraunces',serif; font-size:clamp(2.2rem,8vw,3.6rem);
    font-weight:300; letter-spacing:-.01em; line-height:1.1; text-align:center;
  }
  #hint { margin-top:18px; font-size:11px; color:var(--ink-faint); letter-spacing:.06em; text-transform:uppercase; }

  /* ── Speak buttons ── */
  #speak-btn, #speak-btn-back {
    position:absolute; top:16px; right:16px; width:36px; height:36px;
    border:1.5px solid var(--ink-faint); border-radius:50%; background:transparent;
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    color:var(--ink-muted); transition:border-color .2s,color .2s; font-size:15px;
  }
  #speak-btn:hover, #speak-btn-back:hover { border-color:var(--ink); color:var(--ink); }
  #speak-btn.speaking, #speak-btn-back.speaking { color:var(--ink); border-color:var(--ink); }

  /* ── Back ── */
  #back-word {
    font-family:'Fraunces',serif; font-size:1.7rem; font-weight:300;
    margin-bottom:20px; padding-right:44px;
  }
  .def-row { display:flex; gap:12px; margin-bottom:12px; width:100%; }
  .pos-tag {
    font-size:10px; color:var(--ink-faint); border:1px solid var(--ink-faint);
    padding:2px 6px; border-radius:4px; white-space:nowrap;
    height:fit-content; margin-top:2px; letter-spacing:.04em; flex-shrink:0;
  }
  .def-text { font-size:14px; color:var(--ink); line-height:1.5; }
  .en-hint { font-size:11px; color:var(--ink-muted); margin-top:2px; line-height:1.4; font-style:italic; }

  /* ── Actions ── */
  #actions { width:100%; max-width:560px; display:none; gap:8px; margin-bottom:20px; }
  #actions.visible { display:flex; }
  .act-btn {
    flex:1; height:52px; border:none; border-radius:10px; cursor:pointer;
    font-family:'DM Mono',monospace; font-size:18px;
    display:flex; align-items:center; justify-content:center;
    transition:transform .12s;
  }
  .act-btn:active { transform:scale(.96); }
  #btn-again { background:var(--again-bg); color:var(--again); }
  #btn-hard  { background:var(--hard-bg);  color:var(--hard);  }
  #btn-good  { background:var(--good-bg);  color:var(--good);  }
  #btn-easy  { background:var(--easy-bg);  color:var(--easy);  }

  /* ── Stats ── */
  #stats { width:100%; max-width:560px; display:flex; gap:8px; }
  .stat-cell { flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; }
  .stat-num { font-size:18px; }
  #stat-again .stat-num { color:var(--again); }
  #stat-hard  .stat-num { color:var(--hard);  }
  #stat-good  .stat-num { color:var(--good);  }
  #stat-easy  .stat-num { color:var(--easy);  }
  .stat-label { font-size:9px; color:var(--ink-faint); letter-spacing:.06em; text-transform:uppercase; }

  /* ── Shortcuts ── */
  #shortcuts {
    position:fixed; bottom:16px; right:16px;
    background:var(--surface); border:1px solid #e0dbd3; border-radius:10px;
    padding:10px 14px; font-size:10px; color:var(--ink-muted); line-height:1.8;
    box-shadow:0 2px 12px rgba(0,0,0,.06); z-index:100;
  }
  #shortcuts b { color:var(--ink); }

  /* ── Loading overlay ── */
  #loading {
    position:fixed; inset:0; background:var(--bg);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:12px; z-index:200; transition:opacity .4s;
  }
  #loading.hidden { opacity:0; pointer-events:none; }
  #loading-word {
    font-family:'Fraunces',serif; font-size:2rem; font-weight:300; color:var(--ink);
  }
  #loading-sub { font-size:11px; color:var(--ink-faint); letter-spacing:.06em; }
</style>
</head>
<body>

<!-- Loading overlay -->
<div id="loading">
  <div id="loading-word">TOEFL</div>
  <div id="loading-sub">正在連線同步…</div>
</div>

<div id="header">
  <div id="progress-row">
    <span id="progress-text">— / —</span>
    <div id="progress-bar-wrap"><div id="progress-bar" style="width:0%"></div></div>
    <span id="remaining-text">— left</span>
  </div>
  <div id="sync-status">
    <div id="sync-dot"></div>
    <span id="sync-label">連線中…</span>
  </div>
</div>

<div id="scene" onclick="flipCard()">
  <div id="card">
    <div class="face front">
      <button id="speak-btn" onclick="event.stopPropagation();speakCurrent()" title="朗讀 (5/G)">🔊</button>
      <div id="word-display">—</div>
      <div id="hint">tap to reveal · space / 0</div>
    </div>
    <div class="face back">
      <button id="speak-btn-back" onclick="event.stopPropagation();speakCurrent()" title="朗讀 (5/G)">🔊</button>
      <div id="back-word">—</div>
      <div id="definitions"></div>
    </div>
  </div>
</div>

<div id="actions">
  <button class="act-btn" id="btn-again" onclick="rate('again')" title="Again (1/A)">1</button>
  <button class="act-btn" id="btn-hard"  onclick="rate('hard')"  title="Hard (2/S)">2</button>
  <button class="act-btn" id="btn-good"  onclick="rate('good')"  title="Good (3/D)">3</button>
  <button class="act-btn" id="btn-easy"  onclick="rate('easy')"  title="Easy (4/F)">4</button>
</div>

<div id="stats">
  <div class="stat-cell" id="stat-again"><div class="stat-num" id="cnt-again">0</div><div class="stat-label">Again</div></div>
  <div class="stat-cell" id="stat-hard"> <div class="stat-num" id="cnt-hard">0</div> <div class="stat-label">Hard</div></div>
  <div class="stat-cell" id="stat-good"> <div class="stat-num" id="cnt-good">0</div> <div class="stat-label">Good</div></div>
  <div class="stat-cell" id="stat-easy"> <div class="stat-num" id="cnt-easy">0</div> <div class="stat-label">Easy</div></div>
</div>

<div id="shortcuts">
  <b>翻面</b> Space / 0<br>
  <b>Again</b> 1 / A<br>
  <b>Hard</b> 2 / S<br>
  <b>Good</b> 3 / D<br>
  <b>Easy</b> 4 / F<br>
  <b>朗讀</b> 5 / G
</div>

// ── State ──
let queue = [], currentIdx = 0, isFlipped = false;
let stats = { again:0, hard:0, good:0, easy:0 };
let saveTimeout = null;
let isRemoteUpdate = false;

// ── Sync UI helpers ──
function setSyncStatus(state, label) {
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  dot.className = ''; dot.classList.add(state);
  lbl.textContent = label;
}

// ── Save to Firebase (debounced 1.5s) ──
function saveState() {
  clearTimeout(saveTimeout);
  setSyncStatus('syncing', '同步中…');
  saveTimeout = setTimeout(async () => {
    try {
      await set(ref(db, SAVE_PATH), {
        queue, currentIdx, stats, updatedAt: Date.now()
      });
      setSyncStatus('synced', '已同步 ✓');
    } catch(e) {
      setSyncStatus('error', '同步失敗');
      console.error(e);
    }
  }, 1500);
}

// ── Init queue from scratch ──
function initQueue() {
  queue = ALL_VOCAB.map((_,i) => i);
  currentIdx = 0;
  stats = { again:0, hard:0, good:0, easy:0 };
}

// ── Load from Firebase, fall back to fresh ──
async function loadState() {
  try {
    const snap = await get(ref(db, SAVE_PATH));
    if (snap.exists()) {
      const s = snap.val();
      queue = s.queue; currentIdx = s.currentIdx; stats = s.stats;
      return true;
    }
  } catch(e) {
    console.error('Load failed:', e);
    setSyncStatus('error', '載入失敗，使用本機');
  }
  return false;
}

// ── Real-time listener (other device changes) ──
function listenRemote() {
  onValue(ref(db, SAVE_PATH), (snap) => {
    if (!snap.exists() || isRemoteUpdate) return;
    const s = snap.val();
    // Only update if the remote is newer and we're on front face
    if (!isFlipped && s.updatedAt && s.updatedAt > (window._lastSaveAt || 0)) {
      queue = s.queue; currentIdx = s.currentIdx; stats = s.stats;
      render();
      setSyncStatus('synced', '已從其他裝置同步 ✓');
      setTimeout(() => setSyncStatus('synced', '已同步 ✓'), 3000);
    }
  });
}

// ── Render ──
function currentWord() {
  return currentIdx < queue.length ? ALL_VOCAB[queue[currentIdx]] : null;
}

function render() {
  const w = currentWord();
  if (!w) { renderDone(); return; }

  document.getElementById('word-display').textContent = w.word;
  document.getElementById('back-word').textContent = w.word;

  const defEl = document.getElementById('definitions');
  defEl.innerHTML = '';
  w.definitions.forEach(d => {
    const row = document.createElement('div');
    row.className = 'def-row';
    const enPart = d.en_hint ? `<div class="en-hint">${d.en_hint}</div>` : '';
    row.innerHTML = `<span class="pos-tag">${d.pos}</span><div><div class="def-text">${d.def}</div>${enPart}</div>`;
    defEl.appendChild(row);
  });

  const total = queue.length, done = currentIdx;
  document.getElementById('progress-text').textContent = `${done+1} / ${total}`;
  document.getElementById('progress-bar').style.width = total ? (done/total*100).toFixed(1)+'%' : '100%';
  document.getElementById('remaining-text').textContent = `${total-done} left`;
  document.getElementById('cnt-again').textContent = stats.again;
  document.getElementById('cnt-hard').textContent  = stats.hard;
  document.getElementById('cnt-good').textContent  = stats.good;
  document.getElementById('cnt-easy').textContent  = stats.easy;
}

function renderDone() {
  document.getElementById('word-display').textContent = '🎉 Done!';
  document.getElementById('hint').textContent = `All ${ALL_VOCAB.length} cards reviewed`;
  document.getElementById('back-word').textContent = 'Session Complete';
  document.getElementById('definitions').innerHTML = '<div class="def-row"><span class="def-text">Refresh to restart from the beginning, or use Reset below.</span></div>';
  document.getElementById('progress-bar').style.width = '100%';
  document.getElementById('progress-text').textContent = `${ALL_VOCAB.length} / ${ALL_VOCAB.length}`;
  document.getElementById('remaining-text').textContent = '0 left';
}

// ── Flip ──
function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('card').classList.toggle('flipped', isFlipped);
  document.getElementById('actions').classList.toggle('visible', isFlipped);
}
function setFlip(state) {
  isFlipped = state;
  document.getElementById('card').classList.toggle('flipped', state);
  document.getElementById('actions').classList.toggle('visible', state);
}

// ── Rate ──
function rate(rating) {
  if (!isFlipped) return;
  stats[rating]++;
  const total = queue.length;
  if (rating === 'again') {
    const ci = queue[currentIdx];
    queue.splice(currentIdx, 1);
    queue.splice(Math.min(currentIdx+2, queue.length), 0, ci);
  } else if (rating === 'hard') {
    const range = Math.min(5, total-currentIdx-1);
    const offset = range > 0 ? Math.floor(Math.random()*range)+1 : 1;
    const ci = queue[currentIdx];
    queue.splice(currentIdx, 1);
    queue.splice(Math.min(currentIdx+offset, queue.length), 0, ci);
  } else if (rating === 'good') {
    const remaining = total-currentIdx-1;
    const bs = currentIdx+Math.floor(remaining*0.6)+1;
    const insertAt = bs+Math.floor(Math.random()*Math.max(1, total-1-bs+1));
    const ci = queue[currentIdx];
    queue.splice(currentIdx, 1);
    queue.splice(Math.min(insertAt, queue.length), 0, ci);
  } else {
    queue.splice(currentIdx, 1);
    currentIdx = Math.min(currentIdx, queue.length-1);
  }
  window._lastSaveAt = Date.now();
  saveState();
  setFlip(false);
  render();
}
window.rate = rate;

// ── Speak ──
function speakCurrent() {
  const w = currentWord(); if (!w) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(w.word);
  utt.lang = 'en-US'; utt.rate = 0.9;
  document.querySelectorAll('#speak-btn,#speak-btn-back').forEach(b=>b.classList.add('speaking'));
  utt.onend = utt.onerror = () => {
    document.querySelectorAll('#speak-btn,#speak-btn-back').forEach(b=>b.classList.remove('speaking'));
  };
  window.speechSynthesis.speak(utt);
}
window.speakCurrent = speakCurrent;
window.flipCard = flipCard;

// ── Keyboard ──
document.addEventListener('keydown', e => {
  if (e.repeat) return;
  const k = e.key;
  if (k===' '||k==='0') { e.preventDefault(); flipCard(); }
  else if (k==='1'||k.toLowerCase()==='a') rate('again');
  else if (k==='2'||k.toLowerCase()==='s') rate('hard');
  else if (k==='3'||k.toLowerCase()==='d') rate('good');
  else if (k==='4'||k.toLowerCase()==='f') rate('easy');
  else if (k==='5'||k.toLowerCase()==='g') speakCurrent();
});

// ── Boot ──
(async () => {
  const loaded = await loadState();
  if (!loaded) initQueue();
  render();
  listenRemote();
  setSyncStatus('synced', '已同步 ✓');
  const overlay = document.getElementById('loading');
  overlay.classList.add('hidden');
  setTimeout(() => overlay.remove(), 500);
})();
</script>
